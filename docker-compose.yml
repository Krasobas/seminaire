services:
  strapi:
    build: ./strapi
    container_name: seminaire-strapi
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_FILENAME: /data/data.db
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - ./data/strapi-db:/data
      - ./data/strapi-uploads:/app/public/uploads
    networks:
      - internal

  astro:
    build: .
    container_name: seminaire-astro
    restart: unless-stopped
    environment:
      STRAPI_URL: http://strapi:1337
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN}
    depends_on:
      - strapi
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: seminaire-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - astro
      - strapi
    networks:
      - internal
      - proxy

networks:
  internal:
  proxy:
    external: true
